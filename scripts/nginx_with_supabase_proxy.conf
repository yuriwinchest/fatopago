server {
  # Permite URL e headers grandes do cliente (ate ~256KB) - evita 414 em users com muitas validacoes
  large_client_header_buffers 4 256k;
  client_header_buffer_size 16k;
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Never serve secrets / dotfiles
  location = /.env { return 404; }
  location ~ /\. { return 404; }

  # Block dev paths explicitly (avoid MIME/module issues from stale HTML)
  location ^~ /src/ { return 404; }
  location ^~ /node_modules/ { return 404; }

  # Do not cache the app shell
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location ^~ /assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
  }

  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|pdf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  # Proxy para Supabase — contorna problemas de rota regional com Cloudflare
  # Usuarios em regioes com peering ruim com Cloudflare (ex: alguns ISPs de Teresina-PI)
  # chamam a API do Supabase via este proxy, que passa pela rota do VPS que funciona.
  # "^~" impede que locations regex (ex: *.png/.jpg) capturem antes deste bloco.
  location ^~ /supabase/ {
    # proxy_pass com barra final strippa o prefixo /supabase/
    proxy_pass https://raxjzfvunjxqbxswuipp.supabase.co/;

    # SNI correto para o TLS handshake com a edge do Cloudflare do Supabase
    proxy_ssl_server_name on;
    proxy_ssl_name raxjzfvunjxqbxswuipp.supabase.co;

    # Host header que o Supabase espera receber
    proxy_set_header Host raxjzfvunjxqbxswuipp.supabase.co;

    # IP real do cliente para logs/rate-limit do Supabase
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Suporte a WebSocket para Realtime
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;

    # Timeouts adequados para autenticacao e uploads
    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Permitir uploads via Storage
    client_max_body_size 50M;

    # Buffers maiores para response headers grandes do Supabase (fix 502)
    proxy_buffer_size 512k;
    proxy_buffers 32 256k;
    proxy_busy_buffers_size 1m;

    # Streaming direto sem buffer (importante para realtime e SSE)
    proxy_buffering off;
    proxy_request_buffering off;

    # Nao cachear respostas do Supabase
    proxy_cache off;
    add_header Cache-Control "no-store" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
